<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Coleção Eternizar — Quiz de Vaga</title>
<style>
@font-face{font-family:'Cor';src:url('cg300.woff2') format('woff2');font-weight:300}
@font-face{font-family:'Cor';src:url('cg400.woff2') format('woff2');font-weight:400}
@font-face{font-family:'Cor';src:url('cg500.woff2') format('woff2');font-weight:500}
@font-face{font-family:'Cor';src:url('cg600.woff2') format('woff2');font-weight:600}
@font-face{font-family:'M';src:url('mont300.woff2') format('woff2');font-weight:300}
@font-face{font-family:'M';src:url('mont400.woff2') format('woff2');font-weight:400}
@font-face{font-family:'M';src:url('mont500.woff2') format('woff2');font-weight:500}
@font-face{font-family:'M';src:url('mont600.woff2') format('woff2');font-weight:600}
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --off:#F7F4EF;--cream:#fbf7f0;--beige:#E7D7C6;--rose:#D9A89B;--roseD:#c08778;--roseL:#e6bcb0;
  --olive:#6B6A48;--oliveD:#4e4d36;--terra:#A98772;--champ:#bda283;--ink:#6f6a55;
  --dark:#3d3a2e;--offD:#f1ece3;--white:#fff
}
body{font-family:'M',sans-serif;background:var(--off);color:var(--ink);min-height:100vh}
.serif{font-family:'Cor',Georgia,serif}
.wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:0 20px}

/* top bar */
.topbar{display:flex;align-items:center;gap:14px;padding:18px 0 10px;position:sticky;top:0;background:var(--off);z-index:5}
.backbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--champ);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--olive);font-size:16px;flex-shrink:0}
.backbtn.hidden{visibility:hidden}
.progress-track{flex:1;height:6px;background:var(--offD);border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--olive);border-radius:6px;transition:width .4s ease}

/* screen container */
.stage{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 0 50px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.eyebrow{font-size:12px;letter-spacing:.12em;color:var(--roseD);font-weight:600;text-transform:uppercase;margin-bottom:10px;text-align:center}
h1.q{font-family:'Cor';font-weight:500;font-size:26px;color:var(--oliveD);line-height:1.2;text-align:center;margin-bottom:6px}
p.qsub{font-size:13.5px;color:var(--ink);text-align:center;margin-bottom:22px;opacity:.85}

.opt-list{display:flex;flex-direction:column;gap:12px}
.opt{
  display:flex;align-items:center;gap:14px;
  background:var(--white);border:1.5px solid var(--beige);border-radius:14px;
  padding:16px 18px;cursor:pointer;font-family:'M';font-weight:500;font-size:15.5px;color:var(--dark);
  transition:.2s ease;text-align:left;
}
.opt:hover{border-color:var(--roseD);background:var(--cream)}
.opt .emo{font-size:20px}

.imgcover{width:100%;border-radius:16px;overflow:hidden;margin-bottom:22px;border:1px solid var(--beige)}
.imgcover img{width:100%;display:block}
.imgrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px}
.imgrow img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid var(--beige)}

.btn{
  display:block;width:100%;text-align:center;background:var(--olive);color:var(--off);
  font-family:'M';font-weight:600;font-size:15px;letter-spacing:.02em;
  padding:17px 20px;border-radius:12px;border:none;cursor:pointer;margin-top:6px;
  text-decoration:none;
}
.btn:hover{background:var(--oliveD)}
.btn-sub{text-align:center;font-size:12px;color:var(--ink);margin-top:12px;opacity:.8}

/* loading */
.loading-wrap{text-align:center}
.loading-wrap h1{margin-bottom:26px}
.bar-outer{width:100%;height:14px;background:var(--offD);border-radius:20px;overflow:hidden;margin-bottom:10px}
.bar-inner{height:100%;width:0%;background:linear-gradient(90deg,var(--roseD),var(--olive));border-radius:20px;transition:width .15s linear}
.bar-pct{font-family:'Cor';font-size:20px;color:var(--oliveD);font-weight:600}
.loading-msgs{margin-top:26px;font-size:13.5px;color:var(--ink);min-height:20px}

/* result */
.result-badge{width:96px;height:96px;border-radius:50%;background:var(--olive);color:var(--off);display:flex;align-items:center;justify-content:center;font-family:'Cor';font-size:26px;font-weight:600;margin:0 auto 20px}
.result-title{font-family:'Cor';font-size:28px;color:var(--oliveD);text-align:center;margin-bottom:14px;line-height:1.2}
.result-copy{font-size:14.5px;text-align:center;line-height:1.6;color:var(--ink);margin-bottom:8px}
.result-copy strong{color:var(--roseD)}

/* bio */
.bio-photo{width:140px;height:140px;border-radius:50%;overflow:hidden;margin:0 auto 18px;border:3px solid var(--white);box-shadow:0 4px 18px rgba(0,0,0,.08)}
.bio-photo img{width:100%;height:100%;object-fit:cover}
.bio-name{font-family:'Cor';font-size:24px;color:var(--oliveD);text-align:center;margin-bottom:4px}
.bio-handle{font-size:13px;color:var(--roseD);text-align:center;margin-bottom:18px;font-weight:600}
.bio-copy{font-size:14px;line-height:1.65;color:var(--ink);margin-bottom:12px}

.dots{display:flex;justify-content:center;gap:6px;margin-top:18px}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--beige)}
.dots span.on{background:var(--roseD)}

/* carousel */
.carousel{position:relative;margin-bottom:20px}
.carousel-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:10px;border-radius:16px;-ms-overflow-style:none;scrollbar-width:none}
.carousel-track::-webkit-scrollbar{display:none}
.carousel-track img{flex:0 0 100%;scroll-snap-align:center;width:100%;aspect-ratio:1/1;object-fit:cover;object-position:50% 20%;border-radius:16px;border:1px solid var(--beige)}
.carousel-track img.obj-clara{object-position:50% 8%}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:10px}
.carousel-dots span{width:6px;height:6px;border-radius:50%;background:var(--beige);transition:.2s}
.carousel-dots span.on{background:var(--roseD);width:16px;border-radius:4px}

/* question support photo */
.qphoto{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:14px;margin-top:18px;border:1px solid var(--beige)}

/* result ring */
.ring-wrap{display:flex;justify-content:center;margin:14px 0 10px}
.ring-pct{font-family:'Cor';font-size:34px;font-weight:600;color:var(--dark)}
.ring-box{background:var(--white);border:1px solid var(--beige);border-radius:16px;padding:22px 18px;text-align:center;margin-bottom:10px}
.ring-yes{font-family:'Cor';font-size:20px;color:var(--roseD);font-weight:600;margin-top:8px}
.ring-sub2{font-size:13.5px;color:var(--ink);margin-top:4px}
.result-final{font-family:'Cor';font-size:22px;color:var(--oliveD);text-align:center;margin:16px 0 6px}

/* mentor / authority block, competitor layout */
.auth-photo{width:100%;border-radius:16px;overflow:hidden;margin-bottom:16px;border:1px solid var(--beige);position:relative}
.auth-photo img{width:100%;display:block;aspect-ratio:4/5;object-fit:cover}
.auth-photo .prof-pic{position:absolute;bottom:-2px;right:-2px;width:78px;height:78px;border-radius:50%;overflow:hidden;border:3px solid var(--white);box-shadow:0 3px 14px rgba(0,0,0,.15)}
.auth-photo .prof-pic img{width:100%;height:100%;object-fit:cover;aspect-ratio:auto}
.auth-italic{font-size:14px;font-style:italic;color:var(--ink);text-align:center;margin-bottom:16px}
.blue-box{background:#eef2f6;border-radius:14px;padding:16px 18px;font-size:14px;line-height:1.6;color:var(--dark);margin-bottom:14px}
.blue-box strong{color:var(--oliveD)}

/* warning bridge block */
.siren{font-size:34px;text-align:center;margin:14px 0 6px}
.warn-title{font-family:'Cor';font-size:24px;color:#b23b3b;text-align:center;font-weight:600;margin-bottom:14px}
.warn-box{background:#fbeaea;border-radius:14px;padding:16px 18px;text-align:center;margin-bottom:6px}
.warn-box .tag{display:inline-block;background:#fff;border:1px solid #e2b2b2;color:#b23b3b;font-size:11px;font-weight:700;letter-spacing:.05em;padding:2px 10px;border-radius:6px;margin-bottom:8px}
.warn-box p{font-size:14px;color:#5a3a3a;line-height:1.6}
.warn-box strong{text-decoration:underline}

/* video screen */
.video-wrap{border-radius:16px;overflow:hidden;border:1px solid var(--beige);margin-bottom:16px;background:#000;aspect-ratio:16/9}
.video-wrap iframe{width:100%;height:100%;display:block}
.video-note{font-size:12.5px;color:var(--ink);text-align:center;margin-bottom:14px;opacity:.8}
.btn[disabled]{opacity:.4;pointer-events:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="backbtn" id="backBtn" onclick="prevScreen()">←</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="stage" id="stage"></div>
</div>

<script>
/* ============ CONTEÚDO DO QUIZ — COLEÇÃO ETERNIZAR ============ */
const PIECE_IMGS = [
  "img/tiara-florescer.png",
  "img/grinalda-bride.png",
  "img/porta-coque-floral.png",
  "img/presilha-isa.png",
  "img/tiara-clara.png",
  "img/laco-maya.png"
];

const screens = [];

// 0 — INTRO com carrossel
screens.push({
  type:"intro",
  render:()=>`
    <div style="font-size:34px;text-align:center;margin-bottom:10px">🎁</div>
    <p style="font-size:15px;text-align:center;line-height:1.6;margin-bottom:16px">Pra receber acesso à <strong>Coleção Eternizar</strong> com uma <strong>CONDIÇÃO ESPECIAL DE LOTE ZERO</strong>, você precisa apenas passar por uma pequena seleção respondendo algumas perguntas rápidas.</p>
    <div class="blue-box">
      Essas perguntas vão mostrar se o seu perfil se encaixa no ideal pra garantir a condição especial <strong>do Lote Zero no curso Coleção Eternizar</strong>.
      <br><br>
      E aprender a criar peças em aramado com <strong>alto valor percebido</strong> que vendem rápido, como estas:
    </div>
    <div class="carousel">
      <div class="carousel-track" id="introTrack">
        ${PIECE_IMGS.map(src=>`<img src="${src}" class="${src.includes('tiara-clara')?'obj-clara':''}">`).join("")}
      </div>
      <div class="carousel-dots" id="introDots">
        ${PIECE_IMGS.map((_,i)=>`<span class="${i===0?'on':''}"></span>`).join("")}
      </div>
    </div>
    <button class="btn" onclick="next()">Quero garantir minha vaga</button>
  `,
  onEnter:()=>{
    const track = document.getElementById('introTrack');
    const dots = document.querySelectorAll('#introDots span');
    let idx=0;
    const timer = setInterval(()=>{
      if(!document.body.contains(track)){clearInterval(timer);return;}
      idx = (idx+1) % PIECE_IMGS.length;
      track.scrollTo({left: track.clientWidth*idx, behavior:'smooth'});
      dots.forEach((d,i)=>d.classList.toggle('on', i===idx));
    },2200);
  }
});

// PERGUNTAS — cada uma com ícone relevante na opção + foto de apoio abaixo
const questions = [
  { q:"Quantos anos você tem?", img:0,
    opts:["🌱 18 a 34 anos","🌷 35 a 54 anos","🌻 55 a 64 anos","🍂 +65 anos"] },
  { q:"Você tem filhos?", img:1,
    opts:["👶 Sim","🙅‍♀️ Não"] },
  { q:"Você já acompanha algum conteúdo sobre peças em aramado?", sub:"YouTube, Instagram, TikTok, etc…", img:2,
    opts:["👀 Sim, acompanho muito","😌 Vejo às vezes","🙈 Não conheço"] },
  { q:"Em qual região do Brasil você mora?", sub:"É só pra te encaixar na turma certa da sua região.", img:3,
    opts:["🌴 Norte","☀️ Nordeste","🌾 Centro-Oeste","🏙️ Sudeste","🌲 Sul"] },
  { q:"Qual sua ocupação hoje?", img:4,
    opts:["💼 Apenas trabalho","📚 Apenas estudo","🙏 Sou aposentada","🏠 Sou dona de casa","⚡ Trabalho e estudo"] },
  { q:"Em qual dessas situações você se vê hoje?", img:5,
    opts:["😪 Trabalhando muito e ganhando pouco","😖 Sem uma renda extra que me dê liberdade","💰 Buscando algo que combine com minha rotina","😔 Insatisfeita e querendo uma mudança"] },
  { q:"Qual seu nível de experiência com peças em aramado?", img:0,
    opts:["🙏 Nunca fiz nenhuma peça na vida","🌸 Já tentei, mas não ficaram boas","💫 Já faço peças simples, quero me profissionalizar","🌹 Já tenho experiência, quero técnicas avançadas"] },
  { q:"Se você ganhasse R$3.000 extras por mês fazendo e vendendo tiaras e acessórios…", sub:"qual seria a primeira coisa que você faria com esse dinheiro?", img:1,
    opts:["🏃‍♀️ Sair do meu emprego atual","🏠 Abrir meu próprio ateliê","❤️ Ajudar minha família","🌟 Realizar um sonho antigo"] },
  { q:"Você já fez algum curso online antes?", img:2,
    opts:["💪 Sim, já fiz e concluí","😟 Já comecei, mas não terminei","❌ Nunca fiz"] },
  { q:"Durante o curso, você teria alguém que poderia te apoiar?", img:3,
    opts:["😍 Sim, com certeza","🤔 Talvez","😕 Não"] },
  { q:"Se for aprovada, você se compromete a aproveitar sua vaga do começo ao fim?", img:4,
    opts:["✅ Sim, com certeza","❓ Tenho dúvidas","❌ Não sei ainda"] },
];
questions.forEach(item=>{
  screens.push({
    type:"question",
    render:()=>`
      <h1 class="q">${item.q}</h1>
      ${item.sub?`<p class="qsub">${item.sub}</p>`:'<div style="margin-bottom:14px"></div>'}
      <div class="opt-list">
        ${item.opts.map(o=>`<div class="opt" onclick="next()">${o}</div>`).join("")}
      </div>
    `
  });
});

// LOADING
screens.push({
  type:"loading",
  render:()=>`
    <div class="loading-wrap">
      <h1 class="q serif">Calculando sua compatibilidade com a Coleção Eternizar…</h1>
      <div style="margin-top:30px">
        <div class="bar-outer"><div class="bar-inner" id="barInner"></div></div>
        <div class="bar-pct" id="barPct">0%</div>
      </div>
      <div class="loading-msgs" id="loadMsg">Analisando suas respostas…</div>
    </div>
  `,
  onEnter:()=>{
    const msgs = ["Analisando suas respostas…","Verificando disponibilidade de vagas na sua região…","Cruzando com o perfil ideal de aluna…","Quase lá…"];
    let pct=0;
    const bar=document.getElementById('barInner');
    const pctEl=document.getElementById('barPct');
    const msgEl=document.getElementById('loadMsg');
    let mi=0;
    const interval=setInterval(()=>{
      pct+=Math.random()*9+3;
      if(pct>=100){pct=100;clearInterval(interval);setTimeout(()=>next(),700);}
      bar.style.width=pct+"%";
      pctEl.textContent=Math.floor(pct)+"%";
      const newMi=Math.min(msgs.length-1, Math.floor(pct/26));
      if(newMi!==mi){mi=newMi;msgEl.textContent=msgs[mi];}
    },380);
  }
});

// RESULT — anel circular, mesmo layout do concorrente
screens.push({
  type:"result",
  render:()=>`
    <h1 class="q serif" style="font-size:24px">Uau! 😱</h1>
    <p class="qsub" style="margin-bottom:16px">Que orgulho dizer isso: você atingiu <strong style="color:var(--roseD)">93% de compatibilidade</strong> com o perfil ideal pra garantir a condição especial do Lote Zero na <strong>Coleção Eternizar</strong>! 🎉</p>
    <div class="ring-box">
      <div class="ring-wrap">
        <svg width="170" height="170" viewBox="0 0 170 170">
          <circle cx="85" cy="85" r="72" stroke="#eee3d8" stroke-width="14" fill="none"/>
          <circle id="ringProgress" cx="85" cy="85" r="72" stroke="var(--olive)" stroke-width="14" fill="none"
            stroke-linecap="round" transform="rotate(-90 85 85)"
            stroke-dasharray="452.4" stroke-dashoffset="452.4"/>
          <text x="85" y="94" text-anchor="middle" class="ring-pct" style="font-family:'Cor';font-size:34px;font-weight:600;fill:var(--dark)">93%</text>
        </svg>
      </div>
      <div class="ring-yes">Sim, 93%! Você foi incrível! 🥰</div>
      <div class="ring-sub2">O mínimo necessário era 85%, e você foi muito além.</div>
    </div>
    <div class="result-final">Você tem tudo que a gente procura!</div>
    <p class="qsub" style="margin-bottom:20px">Estamos muito felizes por ver você chegar até aqui. 🎉</p>
    <button class="btn" onclick="next()">Quero ativar minha condição especial</button>
  `,
  onEnter:()=>{
    const circle = document.getElementById('ringProgress');
    const target = 452.4 - (452.4*93/100);
    requestAnimationFrame(()=>{
      circle.style.transition = 'stroke-dashoffset 1.1s ease';
      setTimeout(()=>{ circle.style.strokeDashoffset = target; }, 100);
    });
  }
});

// MENTOR / AUTORIDADE — layout do concorrente (foto grande + selo de perfil + bloco azul)
screens.push({
  type:"bio",
  render:()=>`
    <h1 class="q" style="font-size:22px">A sua condição especial de <span style="color:var(--roseD)">Lote Zero</span> está garantida! ✅</h1>
    <p class="auth-italic">E agora que você é oficialmente nossa aluna, deixa eu me apresentar:</p>
    <div class="auth-photo">
      <img src="img/especialista-insta.jpg">
      <div class="prof-pic"><img src="img/especialista.png"></div>
    </div>
    <div class="blue-box">
      💙 Eu me chamo <strong>Danielle Salvador</strong>, sou artesã de peças em aramado há mais de <strong>12 anos</strong>. Já formei <strong>+3.000 alunas em mais de 8 países</strong> e hoje compartilho minha rotina e trabalho pra <strong>+128 mil seguidoras</strong> no meu Instagram.
    </div>
    <p style="font-size:14px;line-height:1.6;margin-bottom:18px">E pra gente começar nossa relação de aluna e professora do jeito certo, eu resolvi, antes de iniciar as aulas, te dar um <strong>presente de boas-vindas</strong> que você vai <strong>AMAR</strong>!</p>
    <button class="btn" onclick="next()">QUERO O PRESENTE</button>
  `
});

// MOSAICO DAS PEÇAS + GARANTIA
screens.push({
  type:"showcase",
  render:()=>`
    <h1 class="q" style="font-size:22px">Veja o que te espera dentro da <span style="color:var(--roseD)">Coleção Eternizar</span></h1>
    <div class="imgcover" style="margin-top:16px">
      <img src="img/mosaico-garantia.jpg">
    </div>
    <button class="btn" onclick="next()">Quero ativar minha condição especial</button>
  `
});

// PONTE PRO VÍDEO — aviso obrigatório, layout do concorrente
screens.push({
  type:"bridge",
  render:()=>`
    <h1 class="q">Agora, clique no botão abaixo e veja o vídeo que explica tudo que você vai aprender na <span style="color:var(--roseD)">Coleção Eternizar</span></h1>
    <div class="blue-box">
      💙 E também mostra, passo a passo, como ativar a condição especial do Lote Zero que você acabou de conquistar.
    </div>
    <div class="siren">🚨</div>
    <div class="warn-title">Mas atenção!</div>
    <div class="warn-box">
      <span class="tag">AVISO</span>
      <p>Para não correr o risco de <strong>perder a sua condição especial do Lote Zero</strong>…<br><br>É obrigatório que você veja <strong>ATÉ O FINAL</strong> o vídeo que está na próxima página.</p>
    </div>
    <button class="btn" style="margin-top:16px" onclick="next()">Quero ativar minha condição especial</button>
  `
});

// VÍDEO — embed + liberação da CTA após alguns segundos
screens.push({
  type:"video",
  render:()=>`
    <h1 class="q" style="font-size:22px">Assista até o final pra não perder sua condição especial 👇</h1>
    <div class="video-wrap">
      <iframe src="https://www.youtube.com/embed/V7Gfi7Ifck4" title="Coleção Eternizar" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <p class="video-note" id="videoNote">O botão abaixo libera em alguns instantes…</p>
    <a class="btn" id="videoCta" href="index.html" style="opacity:.4;pointer-events:none">Aguarde…</a>
  `,
  onEnter:()=>{
    const cta = document.getElementById('videoCta');
    const note = document.getElementById('videoNote');
    setTimeout(()=>{
      cta.style.opacity='1';
      cta.style.pointerEvents='auto';
      cta.textContent = "Ver minha condição especial";
      note.style.display='none';
    }, 9000);
  }
});

/* ============ MOTOR DO QUIZ (não precisa mexer) ============ */
let current = 0;
const stage = document.getElementById('stage');
const progressFill = document.getElementById('progressFill');
const backBtn = document.getElementById('backBtn');

function renderScreen(){
  const s = screens[current];
  stage.innerHTML = s.render();
  const pct = Math.round((current/(screens.length-1))*100);
  progressFill.style.width = pct+"%";
  backBtn.classList.toggle('hidden', current===0);
  if(s.onEnter) s.onEnter();
  window.scrollTo(0,0);
}
function next(){
  if(current < screens.length-1){ current++; renderScreen(); }
}
function prevScreen(){
  if(current > 0){ current--; renderScreen(); }
}
renderScreen();
</script>

</body>
</html>
